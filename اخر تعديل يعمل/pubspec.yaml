name: lawdesk_flutter
description: A legal management app for desktop using Flutter.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_icon.png
    - assets/images/logo_background.png

dependencies:
  flutter:
    sdk: flutter
  uuid: ^4.4.0
  sqflite: ^2.3.3
  provider: ^6.1.2
  supabase_flutter: ^2.6.0
  timezone: ^0.10.1
  logger: ^2.0.2
  connectivity_plus: ^6.1.4
  path: ^1.9.0
  sqflite_common_ffi: 2.3.2+1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.2
  pdf: ^3.11.3
  http: ^1.5.0
  file_picker: ^10.3.2
  open_file: ^3.2.1
  flutter_svg: ^2.0.9
  flutter_slidable: ^4.0.1
  flutter_staggered_grid_view: ^0.7.0
  fluttertoast: ^8.2.1
  flutter_html: ^3.0.0-alpha.6
 
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_local_notifications: ^19.4.1
  flutter_native_splash: ^2.2.12
  url_launcher: ^6.2.5
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0